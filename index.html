<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Academic Publishing — Live Map</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050a14;
      --panel-bg:  rgba(6, 15, 35, 0.88);
      --accent:    #00d4ff;
      --accent2:   #a855f7;
      --accent3:   #22c55e;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --border:    rgba(0, 212, 255, 0.18);
      --glow:      0 0 20px rgba(0, 212, 255, 0.35);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

    /* ── Top bar ── */
    #topbar {
      position: relative; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    #topbar h1 {
      font-size: 1.05rem; font-weight: 700; letter-spacing: 0.05em;
      color: var(--accent); text-shadow: var(--glow);
      display: flex; align-items: center; gap: 9px;
    }

    .pulse-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent3); box-shadow: 0 0 8px var(--accent3);
      animation: pulse-ring 1.6s ease-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0   rgba(34,197,94,.7); }
      70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0   rgba(34,197,94,0); }
    }

    .live-tag {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em;
      color: var(--accent3); text-transform: uppercase;
    }

    /* ── Counter strip ── */
    #counter-strip {
      position: relative; z-index: 20;
      display: flex; gap: 2px; flex-wrap: wrap;
      padding: 0 20px 7px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .stat-pill {
      display: flex; flex-direction: column; align-items: center;
      padding: 5px 16px;
      background: rgba(0,212,255,.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 105px;
    }
    .stat-pill .val {
      font-size: 1.2rem; font-weight: 700;
      color: var(--accent); font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      text-shadow: 0 0 10px rgba(0,212,255,.5);
    }
    .stat-pill .lbl {
      font-size: 0.62rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px;
    }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
    }

    #globe-canvas {
      display: block;
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* ── Side panel ── */
    #side-panel {
      position: absolute; top: 10px; right: 14px; z-index: 20;
      width: 218px;
      display: flex; flex-direction: column; gap: 9px;
    }

    .panel-card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(12px);
    }

    .panel-card h3 {
      font-size: 0.66rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 9px;
      display: flex; align-items: center; gap: 5px;
    }
    .panel-card h3 .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 5px var(--accent);
    }

    /* Country leaderboard */
    .country-row {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .country-row:last-child { border-bottom: none; }
    .country-rank  { font-size: 0.6rem; color: var(--muted); width: 13px; text-align: right; flex-shrink: 0; }
    .country-flag  { font-size: .9rem; flex-shrink: 0; }
    .country-name  { flex: 1; font-size: 0.7rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .country-bar-wrap { width: 54px; height: 4px; background: rgba(255,255,255,.07); border-radius: 2px; flex-shrink: 0; overflow: hidden; }
    .country-bar   { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 1s ease; }
    .country-count { font-size: 0.6rem; color: var(--accent); font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; flex-shrink: 0; }

    /* Fields */
    .field-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 0; font-size: 0.68rem;
    }
    .field-name  { color: var(--text); }
    .field-badge {
      font-size: 0.58rem; font-weight: 700;
      padding: 1px 6px; border-radius: 10px;
      font-variant-numeric: tabular-nums;
    }

    /* Feed */
    #feed-list {
      max-height: 170px; overflow: hidden;
      display: flex; flex-direction: column; gap: 4px;
    }
    .feed-item {
      font-size: 0.65rem; padding: 4px 7px;
      border-radius: 5px; border-left: 2px solid var(--accent);
      background: rgba(0,212,255,.04);
      animation: slide-in .35s ease;
      flex-shrink: 0;
    }
    .feed-item .fi-country { color: var(--accent); font-weight: 600; }
    .feed-item .fi-field   { color: var(--accent2); }
    .feed-item .fi-text    { color: var(--muted); line-height: 1.3; }
    .feed-item .fi-venue   { color: rgba(226,232,240,0.55); font-size: 0.58rem; display: block; margin-top: 1px; }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Legend ── */
    #legend {
      position: absolute; bottom: 14px; left: 14px; z-index: 20;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 13px;
      backdrop-filter: blur(12px);
      font-size: 0.65rem;
    }
    #legend h4 {
      font-size: 0.62rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
    }
    .legend-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 3px; color: var(--text);
    }
    .legend-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* Status */
    #status {
      position: absolute; bottom: 14px; right: 14px; z-index: 20;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 13px;
      backdrop-filter: blur(12px);
      font-size: 0.65rem;
      color: var(--muted);
      max-width: 320px;
    }
    #status b { color: var(--text); font-weight: 600; }

    @media (max-width: 600px) {
      #side-panel { display: none; }
      #legend { display: none; }
      #status { display: none; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">

</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   Global Academic Publishing — OpenAlex live feed + static aggregates
   No external libraries. Pure HTML5 Canvas.
═══════════════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  /* ── 0. LIVE CONFIG ─────────────────────────────────────────────────── */

  const LIVE_MODE = true; // keep a toggle in case you want to revert
  const OPENALEX_ENDPOINT =
    'https://api.openalex.org/works?per-page=25&sort=publication_date:desc';
  const POLL_INTERVAL_MS = 25000; // 25s; freeze if nothing new
  const MAX_NEW_PER_POLL = 6;     // cap bursts so it stays readable
  const REPLAY_INTERVAL_MS = 1500; // drip-feed one event every 1500ms
  const INITIAL_FETCH_SIZE = 200; // first poll fetches a larger batch
  const MAX_REPLAY_SKIP = 5;     // max works to skip per drip tick (no country/coords)

  const statusEl = document.getElementById('status-text');

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  /* ── 1. DATA ────────────────────────────────────────────────────────── */

  // [flag, name, lat°, lon°, weight (legacy), isoCode]
  const COUNTRIES = [

    ['🇦🇺','Australia',      -25.27,  133.78,  3, 'AU'],

    ['🇵🇹','Portugal',        39.40,   -8.22,  1, 'PT'],
    ['🇹🇷','Turkey',          38.96,   35.24,  1, 'TR'],
    ['🇮🇷','Iran',            32.43,   53.69,  1, 'IR'],
    ['🇿🇦','South Africa',   -30.56,   22.94,  1, 'ZA'],
    ['🇲🇽','Mexico',          23.63, -102.55,  1, 'MX'],
    ['🇦🇷','Argentina',      -38.42,  -63.62,  1, 'AR'],
    ['🇸🇦','Saudi Arabia',    23.89,   45.08,  1, 'SA'],
    ['🇳🇴','Norway',          60.47,    8.47,  1, 'NO'],
    ['🇩🇰','Denmark',         56.26,    9.50,  1, 'DK'],
    ['🇫🇮','Finland',         61.92,   25.75,  1, 'FI'],
    ['🇧🇪','Belgium',         50.50,    4.47,  1, 'BE'],
    ['🇦🇹','Austria',         47.52,   14.55,  1, 'AT'],
    ['🇸🇬','Singapore',        1.35,  103.82,  1, 'SG'],
    ['🇭🇰','Hong Kong',       22.40,  114.11,  1, 'HK'],
    ['🇮🇱','Israel',          31.05,   34.85,  1, 'IL'],
    ['🇨🇿','Czech Republic',  49.82,   15.47,  1, 'CZ'],
    ['🇬🇷','Greece',          39.07,   21.82,  1, 'GR'],
    ['🇺🇦','Ukraine',         48.38,   31.17,  1, 'UA'],
    ['🇳🇿','New Zealand',    -40.90,  174.89,  1, 'NZ'],
    ['🇨🇱','Chile',          -35.68,  -71.54,  1, 'CL'],
    ['🇳🇬','Nigeria',          9.08,    8.68,  1, 'NG'],
    ['🇪🇬','Egypt',           26.82,   30.80,  1, 'EG'],
    ['🇵🇰','Pakistan',        30.38,   69.35,  1, 'PK'],
    ['🇧🇩','Bangladesh',      23.68,   90.36,  1, 'BD'],
    ['🇲🇾','Malaysia',         4.21,  109.45,  1, 'MY'],
    ['🇮🇩','Indonesia',       -0.79,  113.92,  1, 'ID'],
    ['🇹🇭','Thailand',        15.87,  100.99,  1, 'TH'],
    ['🇵🇭','Philippines',     12.88,  121.77,  1, 'PH'],
    ['🇻🇳','Vietnam',         14.06,  108.28,  1, 'VN'],
    ['🇷🇴','Romania',         45.94,   24.97,  1, 'RO'],
    ['🇭🇺','Hungary',         47.16,   19.50,  1, 'HU'],
    ['🇸🇰','Slovakia',        48.67,   19.70,  1, 'SK'],
  ];

  const COUNTRY_BY_ISO = new Map(COUNTRIES.map(c => [c[5], c]));

  // Keep the existing colors (they represent your “domain” palette).
  // For live OpenAlex, we’ll map concepts → one of these colors.
  const FIELDS = [
    { name: 'Computer Science',      color: '#00d4ff' },
    { name: 'Medicine',              color: '#a855f7' },
    { name: 'Physics',               color: '#00d4ff' },
    { name: 'Biology',               color: '#22c55e' },
    { name: 'Chemistry',             color: '#00d4ff' },
    { name: 'Engineering',           color: '#00d4ff' },
    { name: 'Economics',             color: '#22c55e' },
    { name: 'Social Sciences',       color: '#22c55e' },
    { name: 'Psychology',            color: '#22c55e' },
    { name: 'Environmental Science', color: '#ef4444' },
    { name: 'Mathematics',           color: '#00d4ff' },
    { name: 'History',               color: '#f59e0b' },
    { name: 'Linguistics',           color: '#f59e0b' },
    { name: 'Astronomy',             color: '#00d4ff' },
    { name: 'Neuroscience',          color: '#a855f7' },
    { name: 'Climate Science',       color: '#ef4444' },
    { name: 'Genomics',              color: '#a855f7' },
    { name: 'Political Science',     color: '#22c55e' },
    { name: 'Philosophy',            color: '#f59e0b' },
    { name: 'Materials Science',     color: '#00d4ff' },
  ];

  /* ── 2. HELPERS ─────────────────────────────────────────────────────── */

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
  }

  function deg2rad(d) { return d * Math.PI / 180; }

  /* Add geographic jitter so dots from the same country don't perfectly overlap */
  function jitter(lat, lng, radius) {
    const angle = Math.random() * 2 * Math.PI;
    const dist  = Math.random() * (radius || 3);
    return { lat: lat + Math.sin(angle) * dist, lng: lng + Math.cos(angle) * dist };
  }

  function safeText(s) {
    return String(s || '').replace(/[&<>"']/g, ch => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[ch]));
  }

  /* Format large numbers compactly: 2800000 → "2.8M", 15000 → "15.0K" */
  function compactNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return Number(n).toLocaleString();
  }

  /* Map a concept / discipline name to a domain color */
  function domainColor(name) {
    const n = (name || '').toLowerCase();
    if (/medicine|health|clinical|neuro|genom|pharma|immun|oncolog|biology|biochem/.test(n)) return '#a855f7';
    if (/psycholog|sociolog|econom|politic|education|anthropolog|social/.test(n)) return '#22c55e';
    if (/history|philosophy|linguistic|literature|arts|music|religion/.test(n)) return '#f59e0b';
    if (/climate|environment|ecolog|geolog|earth|ocean|hydrolog/.test(n)) return '#ef4444';
    return '#00d4ff';
  }

  /* ── 3. ORTHOGRAPHIC PROJECTION ─────────────────────────────────────── */

  function project(latDeg, lngDeg, rotLon, rotLat) {
    const φ  = deg2rad(latDeg);
    const λ  = deg2rad(lngDeg);
    const φ0 = deg2rad(rotLat);
    const λ0 = deg2rad(rotLon);
    const dλ = λ - λ0;
    const sinφ  = Math.sin(φ),  cosφ  = Math.cos(φ);
    const sinφ0 = Math.sin(φ0), cosφ0 = Math.cos(φ0);
    const cosdλ = Math.cos(dλ);
    const z = sinφ * sinφ0 + cosφ * cosφ0 * cosdλ;
    if (z < 0) return null;
    return {
      x:  cosφ * Math.sin(dλ),
      y: -sinφ * cosφ0 + cosφ * sinφ0 * cosdλ,
      z,
    };
  }

  function greatCirclePoints(lat1, lng1, lat2, lng2, n) {
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const t = i / n;
      const φ1 = deg2rad(lat1), λ1 = deg2rad(lng1);
      const φ2 = deg2rad(lat2), λ2 = deg2rad(lng2);
      const x1 = Math.cos(φ1)*Math.cos(λ1), y1 = Math.cos(φ1)*Math.sin(λ1), z1 = Math.sin(φ1);
      const x2 = Math.cos(φ2)*Math.cos(λ2), y2 = Math.cos(φ2)*Math.sin(λ2), z2 = Math.sin(φ2);
      const dot = Math.max(-1, Math.min(1, x1*x2 + y1*y2 + z1*z2));
      const Ω   = Math.acos(dot);
      let xi, yi, zi;
      if (Ω < 1e-6) {
        xi = x1; yi = y1; zi = z1;
      } else {
        const s = 1 / Math.sin(Ω);
        const a = Math.sin((1-t)*Ω) * s;
        const b = Math.sin(t*Ω)     * s;
        xi = a*x1 + b*x2;
        yi = a*y1 + b*y2;
        zi = a*z1 + b*z2;
      }
      const len = Math.hypot(xi, yi, zi) || 1;
      xi /= len; yi /= len; zi /= len;
      pts.push({
        lat: Math.asin(zi) * 180 / Math.PI,
        lng: Math.atan2(yi, xi) * 180 / Math.PI,
      });
    }
    return pts;
  }

  function liftedArcPoints(lat1, lng1, lat2, lng2, n, lift) {
    const gcPts = greatCirclePoints(lat1, lng1, lat2, lng2, n);
    return gcPts.map((p, i) => {
      const t = i / n;
      const sinT = Math.sin(t * Math.PI);
      return { lat: p.lat + sinT * lift * 5, lng: p.lng, sinT };
    });
  }

  /* ── 4. COUNTERS (real events only) ─────────────────────────────────── */

  const NOW       = new Date();
  const DAY_START = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());

  let totalEvents = 0;
  const activeCountrySet = new Set();
  const todayEventCountByCountry = Object.fromEntries(COUNTRIES.map(c => [c[5], 0]));

  const elToday     = document.getElementById('cnt-today');
  const elCountries = document.getElementById('cnt-countries');
  const elEvents    = document.getElementById('cnt-events');

  function updateCounters() {
    elToday.textContent     = totalEvents.toLocaleString();
    elCountries.textContent = activeCountrySet.size;
    elEvents.textContent    = totalEvents.toLocaleString();
  }

  /* ── 5. SIDE PANEL (static snapshots) ──────────────────────────────── */

  async function loadJson(path) {
    const res = await fetch(path, { cache: 'no-store' });
    if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
    return res.json();
  }

  async function loadAggregates() {
    let countryDone = false, disciplineDone = false;

    /* Try live OpenAlex group-by endpoints first */
    try {
      const [cRes, dRes] = await Promise.all([
        fetch('https://api.openalex.org/works?group_by=authorships.institutions.country_code', {
          cache: 'no-store', headers: { 'Accept': 'application/json' }
        }),
        fetch('https://api.openalex.org/works?group_by=concepts.id', {
          cache: 'no-store', headers: { 'Accept': 'application/json' }
        }),
      ]);

      if (cRes.ok) {
        const cData = await cRes.json();
        const groups = Array.isArray(cData?.group_by) ? cData.group_by : [];
        if (groups.length > 0) {
          renderCountrySnapshot({
            countries: groups
              .filter(g => {
                if (typeof g.key !== 'string') return false;
                const k = g.key.trim();
                return k.length === 2 && /^[A-Za-z]{2}$/.test(k);
              })
              .slice(0, 15)
              .map(g => ({
                iso2: g.key.trim().toUpperCase(),
                name: g.key_display_name || null,
                count: g.count
              }))
          });
          countryDone = true;
        }
      }

      if (dRes.ok) {
        const dData = await dRes.json();
        const groups = Array.isArray(dData?.group_by) ? dData.group_by : [];
        if (groups.length > 0) {
          renderDisciplineSnapshot({
            disciplines: groups.slice(0, 8).map(g => ({
              name: g.key_display_name,
              count: g.count,
              color: domainColor(g.key_display_name)
            }))
          });
          disciplineDone = true;
        }
      }
    } catch (e) {
      console.warn('Live aggregate fetch failed, falling back to JSON:', e);
    }

    /* Fall back to local JSON for any panel that didn't load live */
    try {
      if (!countryDone) {
        const countries = await loadJson('./data/country_rankings.json');
        renderCountrySnapshot(countries);
      }
      if (!disciplineDone) {
        const disciplines = await loadJson('./data/discipline_breakdown.json');
        renderDisciplineSnapshot(disciplines);
      }
    } catch (e) {
      console.error('JSON fallback also failed:', e);
    }

    setStatus('Live (OpenAlex). Waiting for new works…');
  }

  function renderCountrySnapshot(snapshot) {
    const el = document.getElementById('country-list');
    const rows = Array.isArray(snapshot?.countries) ? snapshot.countries.slice(0, 8) : [];

    const max = rows[0]?.count || 1;
    el.innerHTML = rows.map((r, i) => {
      const country = COUNTRY_BY_ISO.get(r.iso2);
      const flag = country ? country[0] : '🏳️';
      const name = country ? country[1] : (r.name || r.iso2 || 'Unknown');
      const pct = Math.round((r.count / max) * 100);
      return `
        <div class="country-row">
          <span class="country-rank">${i + 1}</span>
          <span class="country-flag">${flag}</span>
          <span class="country-name">${safeText(name)}</span>
          <div class="country-bar-wrap">
            <div class="country-bar" style="width:${pct}%"></div>
          </div>
          <span class="country-count">${compactNum(r.count || 0)}</span>
        </div>`;
    }).join('');
  }

  function renderDisciplineSnapshot(snapshot) {
    const el = document.getElementById('field-list');
    const rows = Array.isArray(snapshot?.disciplines) ? snapshot.disciplines.slice(0, 8) : [];

    el.innerHTML = rows.map(r => {
      const color = r.color || '#a855f7';
      return `
        <div class="field-row">
          <span class="field-name">${safeText(r.name || 'Unknown')}</span>
          <span class="field-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">
            ${compactNum(r.count || 0)}
          </span>
        </div>`;
    }).join('');
  }

  /* ── 6. FEED (real titles) ─────────────────────────────────────────── */

  const feedEl  = document.getElementById('feed-list');
  const FEED_MAX = 7;

  function addFeedItemReal(country, field, title, venue, year) {
    const item = document.createElement('div');
    item.className = 'feed-item';
    item.style.borderLeftColor = field.color;

    const venueLine = venue ? `<span class="fi-venue">${safeText(venue)}${year ? ` · ${year}` : ''}</span>` : '';

    item.innerHTML = `
      <span class="fi-country">${country[0]} ${safeText(country[1])}</span> ·
      <span class="fi-field" style="color:${field.color}">${safeText(field.name)}</span><br>
      <span class="fi-text">${safeText(title)}</span>
      ${venueLine}
    `;
    feedEl.insertBefore(item, feedEl.firstChild);
    while (feedEl.children.length > FEED_MAX) feedEl.removeChild(feedEl.lastChild);
  }

  /* ── 7. CANVAS & GLOBE STATE ───────────────────────────────────────── */

  const canvas = document.getElementById('globe-canvas');
  const ctx    = canvas.getContext('2d');

  let rotLon = 0;
  let rotLat = 20;
  let isDragging = false;
  let dragStart  = { x: 0, y: 0, lon: 0, lat: 0 };

  let stars = [];

  function buildStars(w, h) {
    stars = Array.from({ length: 200 }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.3 + 0.2,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.005,
    }));
  }

  function resize() {
    const wrap = document.getElementById('canvas-wrap');
    canvas.width  = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    buildStars(canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  function globeGeom() {
    const R  = Math.min(canvas.width, canvas.height) * 0.42;
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    return { R, cx, cy };
  }

  function toScreen(latDeg, lngDeg) {
    const { R, cx, cy } = globeGeom();
    const p = project(latDeg, lngDeg, rotLon, rotLat);
    if (!p) return null;
    return { x: cx + R * p.x, y: cy + R * p.y, z: p.z };
  }

  /* ── 8. PARTICLE SYSTEM (real events only) ─────────────────────────── */

  const particles = [];

  // A simple “co-author country” pick: choose any different known country (not simulated count-based)
  function pickDestinationCountry(exceptIso2) {
    for (let tries = 0; tries < 12; tries++) {
      const c = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
      if (c[5] !== exceptIso2) return c;
    }
    return COUNTRIES[0];
  }

  function spawnEventReal(country, field, title, venue, year) {
    const pos = jitter(country[2], country[3]);

    let dest = pickDestinationCountry(country[5]);
    const dpos = jitter(dest[2], dest[3]);

    particles.push({
      type: 'event',
      country, field,
      lat: pos.lat, lng: pos.lng,
      dLat: dpos.lat, dLng: dpos.lng,
      born: performance.now(),
      ttl: 5500 + Math.random() * 2000,
    });

    activeCountrySet.add(country[5]);
    todayEventCountByCountry[country[5]] = (todayEventCountByCountry[country[5]] || 0) + 1;

    totalEvents++;
    addFeedItemReal(country, field, title, venue, year);
  }

  /* ── 9. DRAWING ────────────────────────────────────────────────────── */

  function drawStars() {
    for (const s of stars) {
      s.a += s.da;
      if (s.a <= 0.1) { s.a = 0.1; s.da = Math.abs(s.da); }
      if (s.a >= 1.0) { s.a = 1.0; s.da = -Math.abs(s.da); }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a.toFixed(2)})`;
      ctx.fill();
    }
  }

  function drawGlobe() {
    const { R, cx, cy } = globeGeom();

    const grad = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.25, R * 0.05,
                                          cx, cy, R);
    grad.addColorStop(0,   '#0e3a5a');
    grad.addColorStop(0.5, '#072030');
    grad.addColorStop(1,   '#020d1a');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    const rim = ctx.createRadialGradient(cx, cy, R * 0.92, cx, cy, R * 1.08);
    rim.addColorStop(0,   'rgba(0,150,255,0.18)');
    rim.addColorStop(0.5, 'rgba(0,100,200,0.08)');
    rim.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, R * 1.08, 0, Math.PI * 2);
    ctx.fillStyle = rim;
    ctx.fill();

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.clip();

    ctx.lineWidth = 0.4;
    for (let lat = -80; lat <= 80; lat += 20) {
      ctx.beginPath();
      let first = true;
      for (let lon = -180; lon <= 180; lon += 3) {
        const s = toScreen(lat, lon);
        if (!s) { first = true; continue; }
        if (first) { ctx.moveTo(s.x, s.y); first = false; }
        else ctx.lineTo(s.x, s.y);
      }
      ctx.strokeStyle = 'rgba(0,180,255,0.07)';
      ctx.stroke();
    }

    for (let lon = -180; lon < 180; lon += 30) {
      ctx.beginPath();
      let first = true;
      for (let lat = -90; lat <= 90; lat += 3) {
        const s = toScreen(lat, lon);
        if (!s) { first = true; continue; }
        if (first) { ctx.moveTo(s.x, s.y); first = false; }
        else ctx.lineTo(s.x, s.y);
      }
      ctx.strokeStyle = 'rgba(0,180,255,0.07)';
      ctx.stroke();
    }

    drawLandDots();
    ctx.restore();
  }

  const LAND_DOTS = (function () {
    const pts = [];
    for (let lat = -80; lat <= 80; lat += 4) {
      const cosL = Math.abs(Math.cos(deg2rad(lat)));
      const step = Math.max(3, Math.round(5 / (cosL + 0.01)));
      for (let lng = -180; lng < 180; lng += step) {
        if (isLand(lat, lng)) pts.push([lat, lng]);
      }
    }
    return pts;
  })();

  function isLand(lat, lng) {
    if (lat > 35 && lat < 72 && lng > -10 && lng < 140) return true;
    if (lat > -10 && lat < 30 && lng > 90 && lng < 145) return true;
    if (lat > 8 && lat < 35 && lng > 68 && lng < 90) return true;
    if (lat > 12 && lat < 30 && lng > 38 && lng < 60) return true;
    if (lat > -35 && lat < 37 && lng > -18 && lng < 52) return true;
    if (lat > 25 && lat < 72 && lng > -168 && lng < -52) return true;
    if (lat > 7 && lat < 25 && lng > -92 && lng < -75) return true;
    if (lat > -56 && lat < 12 && lng > -82 && lng < -34) return true;
    if (lat > 60 && lat < 84 && lng > -55 && lng < -18) return true;
    if (lat > -40 && lat < -10 && lng > 114 && lng < 154) return true;
    if (lat > -47 && lat < -34 && lng > 166 && lng < 178) return true;
    if (lat > 31 && lat < 46 && lng > 128 && lng < 146) return true;
    if (lat > 57 && lat < 72 && lng > 4 && lng < 32) return true;
    if (lat > 49 && lat < 60 && lng > -10 && lng < 2) return true;
    if (lat > 63 && lat < 67 && lng > -25 && lng < -13) return true;
    return false;
  }

  function drawLandDots() {
    const { R } = globeGeom();
    const dotR = Math.max(1, R * 0.008);
    ctx.fillStyle = 'rgba(30,90,60,0.6)';
    for (const [lat, lng] of LAND_DOTS) {
      const s = toScreen(lat, lng);
      if (!s) continue;
      ctx.beginPath();
      ctx.arc(s.x, s.y, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles(now) {
    const { R } = globeGeom();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p   = particles[i];
      const age = now - p.born;
      if (age > p.ttl) { particles.splice(i, 1); continue; }
      const life = 1 - age / p.ttl;

      const [r, g, b] = hexToRgb(p.field.color);

      const src = toScreen(p.lat, p.lng);
      if (src) {
        const radius = R * 0.018 * (0.5 + 0.5 * life);
        const grd = ctx.createRadialGradient(src.x, src.y, 0, src.x, src.y, radius * 3);
        grd.addColorStop(0,   `rgba(${r},${g},${b},${(life * 0.8).toFixed(2)})`);
        grd.addColorStop(0.4, `rgba(${r},${g},${b},${(life * 0.3).toFixed(2)})`);
        grd.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(src.x, src.y, radius * 3, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(src.x, src.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(1, life * 1.5).toFixed(2)})`;
        ctx.fill();

        const ringAge  = age / Math.min(p.ttl, 1800);
        const ringR    = R * 0.04 * Math.min(1, ringAge * 2);
        const ringAlpha = Math.max(0, 1 - ringAge * 1.5) * life;
        if (ringAlpha > 0.01) {
          ctx.beginPath();
          ctx.arc(src.x, src.y, ringR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${r},${g},${b},${ringAlpha.toFixed(2)})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }

      const arcProgress = Math.min(1, age / (p.ttl * 0.6));
      if (arcProgress > 0.02) {
        const arcPts = liftedArcPoints(p.lat, p.lng, p.dLat, p.dLng, 40, 8);
        const visible = arcPts.map(pt => toScreen(pt.lat, pt.lng));
        const drawLen = Math.floor(arcProgress * (arcPts.length - 1));

        ctx.beginPath();
        let drawing = false;
        for (let j = 0; j < drawLen; j++) {
          const sv = visible[j];
          if (!sv) { drawing = false; continue; }
          if (!drawing) { ctx.moveTo(sv.x, sv.y); drawing = true; }
          else ctx.lineTo(sv.x, sv.y);
        }
        const arcAlpha = Math.min(0.9, life * 1.3);
        ctx.strokeStyle = `rgba(${r},${g},${b},${arcAlpha.toFixed(2)})`;
        ctx.lineWidth = 1.2;
        ctx.shadowColor = p.field.color;
        ctx.shadowBlur  = 6;
        ctx.stroke();
        ctx.shadowBlur  = 0;

        const tipIdx = Math.min(drawLen, arcPts.length - 1);
        const tip = visible[tipIdx];
        if (tip) {
          ctx.beginPath();
          ctx.arc(tip.x, tip.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r},${g},${b},${arcAlpha.toFixed(2)})`;
          ctx.fill();
        }
      }
    }
  }

  /* ── 10. INTERACTION ───────────────────────────────────────────────── */

  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY, lon: rotLon, lat: rotLat };
  });
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const { R } = globeGeom();
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    rotLon = dragStart.lon - dx / R * 60;
    rotLat = Math.max(-60, Math.min(60, dragStart.lat + dy / R * 60));
  });
  canvas.addEventListener('mouseup',    () => { isDragging = false; });
  canvas.addEventListener('mouseleave', () => { isDragging = false; });

  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    isDragging = true;
    dragStart = { x: t.clientX, y: t.clientY, lon: rotLon, lat: rotLat };
  }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const t = e.touches[0];
    const { R } = globeGeom();
    const dx = t.clientX - dragStart.x;
    const dy = t.clientY - dragStart.y;
    rotLon = dragStart.lon - dx / R * 60;
    rotLat = Math.max(-60, Math.min(60, dragStart.lat + dy / R * 60));
  }, { passive: true });
  canvas.addEventListener('touchend', () => { isDragging = false; });

  /* ── 11. OPENALEX INGEST ───────────────────────────────────────────── */

  const seen = new Set(); // OpenAlex work IDs
  let lastPollAt = 0;
  const replayQueue = [];
  let isFirstPoll = true;

  function inferCountryIso2FromWork(work) {
    // Look through authorships → institutions → country_code
    const authorships = Array.isArray(work?.authorships) ? work.authorships : [];
    for (const a of authorships) {
      const insts = Array.isArray(a?.institutions) ? a.institutions : [];
      for (const inst of insts) {
        const cc = inst?.country_code;
        if (typeof cc === 'string' && cc.length === 2) return cc.toUpperCase();
      }
    }
    return null;
  }

  function domainFieldFromConcepts(work) {
    const concepts = Array.isArray(work?.concepts) ? work.concepts : [];
    const top = concepts
      .filter(c => typeof c?.score === 'number')
      .sort((a, b) => b.score - a.score)[0];

    const name = (top?.display_name || '').toLowerCase();

    // Lightweight bucketing into your palette (adjust whenever you like)
    if (/medicine|health|clinical|neuro|genom|pharma|immun|oncolog/.test(name)) {
      return { name: top?.display_name || 'Medicine', color: '#a855f7' };
    }
    if (/psycholog|sociolog|econom|politic|education|anthropolog|social/.test(name)) {
      return { name: top?.display_name || 'Social Sciences', color: '#22c55e' };
    }
    if (/history|philosophy|linguistic|literature|arts|music|religion/.test(name)) {
      return { name: top?.display_name || 'Arts & Humanities', color: '#f59e0b' };
    }
    if (/climate|environment|ecolog|geolog|earth|ocean|hydrolog/.test(name)) {
      return { name: top?.display_name || 'Earth & Environment', color: '#ef4444' };
    }
    // Default STEM-ish
    return { name: top?.display_name || 'STEM / Computing', color: '#00d4ff' };
  }

  function yearFromWork(work) {
    if (typeof work?.publication_year === 'number') return work.publication_year;
    const d = work?.publication_date;
    if (typeof d === 'string' && d.length >= 4) {
      const y = parseInt(d.slice(0, 4), 10);
      return Number.isFinite(y) ? y : null;
    }
    return null;
  }

  async function pollOpenAlex() {
    if (!LIVE_MODE) return;

    const started = performance.now();
    try {
      setStatus('Polling OpenAlex…');
      const perPage = isFirstPoll ? INITIAL_FETCH_SIZE : 25;
      const url = `https://api.openalex.org/works?per-page=${perPage}&sort=publication_date:desc`;

      const res = await fetch(url, {
        cache: 'no-store',
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) throw new Error(`OpenAlex HTTP ${res.status}`);

      const data = await res.json();
      const results = Array.isArray(data?.results) ? data.results : [];

      // Identify new works; buffer oldest-first for smooth replay
      const fresh = [];
      for (const w of results) {
        const id = w?.id;
        if (!id || seen.has(id)) continue;
        seen.add(id);
        fresh.push(w);
      }
      fresh.reverse();

      // Push into the replay queue (drip-fed by replayNext)
      for (const w of fresh) {
        replayQueue.push(w);
      }

      isFirstPoll = false;

      const ms = Math.round(performance.now() - started);
      setStatus(`Live. Buffered ${fresh.length} work(s) in ${ms}ms. Queue: ${replayQueue.length}`);
    } catch (e) {
      console.error(e);
      setStatus('OpenAlex error. Retrying…');
    } finally {
      lastPollAt = Date.now();
      updateCounters();
    }
  }

  /* Drip-feed one event from the buffer onto the globe */
  function replayNext() {
    let attempts = 0;
    while (replayQueue.length > 0 && attempts < MAX_REPLAY_SKIP) {
      attempts++;
      const w = replayQueue.shift();

      const iso2 = inferCountryIso2FromWork(w);
      if (!iso2) continue;
      const country = COUNTRY_BY_ISO.get(iso2);
      if (!country) continue;

      const field = domainFieldFromConcepts(w);
      const title = w?.display_name || w?.title || '(untitled)';
      const venue = w?.host_venue?.display_name || '';
      const year  = yearFromWork(w);

      spawnEventReal(country, field, title, venue, year);
      updateCounters();
      return;
    }
    updateCounters();
  }

  /* ── 12. MAIN LOOP (render only; no simulation) ────────────────────── */

  let lastFrame  = performance.now();

  function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min(now - lastFrame, 100);
    lastFrame = now;

    if (!isDragging) rotLon += 0.012;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawStars();
    drawGlobe();
    drawParticles(now);
  }

  /* Kick off */
  updateCounters();
  loadAggregates().finally(() => {
    // Immediately poll once at startup, then interval
    pollOpenAlex();
    setInterval(pollOpenAlex, POLL_INTERVAL_MS);
    // Drip-feed buffered events onto the globe
    setInterval(replayNext, REPLAY_INTERVAL_MS);
    requestAnimationFrame(loop);
  });

})();
</script>
</body>
</html>
